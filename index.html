<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Code-Lab ★ 司令室</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a1520;--panel:#1e1628;--accent:#c8973e;--text:#e8dcc8;
  --border:#c8973e40;--card-active:#ffffff12;--card-inactive:#ffffff08;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Inter','Noto Sans JP',sans-serif}
#app{display:grid;grid-template-rows:48px 1fr;height:100%}

/* ===== HEADER ===== */
#header{display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;background:var(--panel);border-bottom:1px solid var(--border);z-index:10}
#header .logo{font-size:16px;font-weight:700;white-space:nowrap}
#header .logo span{color:var(--accent)}
#header .phase-display{font-size:13px;font-weight:600;color:var(--accent);
  background:#c8973e18;padding:4px 14px;border-radius:20px;border:1px solid var(--border)}
#header .right{display:flex;align-items:center;gap:12px}
.status-pill{display:flex;align-items:center;gap:6px;font-size:12px;
  padding:4px 10px;border-radius:12px;background:#ffffff10}
.status-dot{width:7px;height:7px;border-radius:50%;background:#5cc878;
  animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#clock{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent)}

/* ===== MAIN ===== */
#main{display:grid;grid-template-columns:1fr 340px;overflow:hidden}
#canvasArea{position:relative;display:flex;flex-direction:column;min-width:0}
#canvas{flex:1;display:block;background:#2a2030}
#statsBar{position:absolute;top:8px;left:8px;display:flex;gap:8px;z-index:5}
.stat-item{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;
  padding:3px 10px;border-radius:10px;background:#00000080;backdrop-filter:blur(4px)}
.stat-item .icon{font-size:14px}
.stat-item .val{font-family:'JetBrains Mono',monospace}
#commandBar{display:flex;align-items:center;gap:8px;padding:8px 12px;
  background:var(--panel);border-top:1px solid var(--border)}
#commandBar .label{font-size:13px;font-weight:700;color:var(--accent);white-space:nowrap}
#commandBar input{flex:1;background:#ffffff08;border:1px solid var(--border);
  border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;
  font-family:'Noto Sans JP',sans-serif;outline:none}
#commandBar input:focus{border-color:var(--accent)}
#commandBar input::placeholder{color:#ffffff40}
#commandBar button{background:var(--accent);color:#1a1520;border:none;
  border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer;font-size:14px}
#commandBar button:hover{filter:brightness(1.15)}
#btnAttach{background:var(--accent);color:#1a1520;border:none;
  font-size:20px;font-weight:900;width:36px;height:36px;border-radius:50%;
  cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;
  transition:transform 0.1s,box-shadow 0.1s,filter 0.1s;flex-shrink:0}
#btnAttach:hover{filter:brightness(1.2);box-shadow:0 0 8px var(--accent)}
#btnAttach:active{transform:scale(0.85);filter:brightness(0.9)}
#attachPreview{display:none;align-items:center;gap:4px;font-size:12px;color:var(--text-dim);
  max-width:40%;overflow-x:auto;overflow-y:hidden;white-space:nowrap}
#attachPreview.show{display:flex}
#attachPreview .file-list{display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto}
#attachPreview .file-tag{background:var(--accent);color:#1a1520;padding:2px 8px;
  border-radius:4px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px;
  white-space:nowrap;flex-shrink:0}
#attachPreview .file-tag .remove{cursor:pointer;opacity:0.7;font-size:13px}
#attachPreview .file-tag .remove:hover{opacity:1}

/* ===== SIDE PANEL ===== */
#sidePanel{display:flex;flex-direction:column;background:var(--panel);
  border-left:1px solid var(--border);overflow-y:auto;overflow-x:hidden}
#sidePanel::-webkit-scrollbar{width:4px}
#sidePanel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.panel-section{padding:10px 12px;border-bottom:1px solid var(--border)}
.section-title{font-size:11px;font-weight:700;color:#ffffff50;text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:8px}

/* Boss Card */
.boss-card{display:flex;align-items:center;gap:10px;padding:10px;
  background:linear-gradient(135deg,#c8973e18,#c8973e08);border:1px solid var(--border);
  border-radius:10px}
.boss-avatar{width:40px;height:40px;border-radius:50%;background:#c8973e20;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  border:2px solid var(--accent)}
.boss-info .name{font-size:14px;font-weight:700}
.boss-info .role{font-size:11px;color:#ffffff60}

/* Agent Card */
.agent-card{display:flex;align-items:flex-start;gap:8px;padding:8px;
  border-radius:8px;margin-bottom:4px;transition:all .3s}
.agent-card.active{background:var(--card-active)}
.agent-card.inactive{background:var(--card-inactive);opacity:.5}
.agent-avatar{width:32px;height:32px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
  border:2px solid transparent}
.agent-card.active .agent-avatar{border-color:var(--agent-color)}
.agent-info{flex:1;min-width:0}
.agent-info .name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:4px}
.agent-info .role{font-size:11px;color:#ffffff50}
.agent-info .action{font-size:11px;color:#ffffff70;margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-info .thought{font-size:11px;color:#ffffff60;font-style:italic;margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status-indicator{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0}
.status-indicator.working{background:#5cc878}
.status-indicator.waiting{background:#c8973e}
.status-indicator.idle{background:#666}

/* Confirm Section */
#confirmSection{display:none}
#confirmSection.visible{display:block}
.confirm-badge{display:inline-flex;align-items:center;gap:4px;
  background:#e0687820;color:#e06878;padding:2px 8px;border-radius:10px;
  font-size:11px;font-weight:700;animation:confirmPulse 1.5s infinite}
@keyframes confirmPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.confirm-card{background:#ffffff08;border:1px solid #e0687840;border-radius:8px;
  padding:10px;margin-top:6px}
.confirm-card .from{font-size:12px;font-weight:600;margin-bottom:4px}
.confirm-card .msg{font-size:12px;color:#ffffff80;margin-bottom:8px}
.confirm-btns{display:flex;gap:6px}
.confirm-btns button{flex:1;padding:5px;border:none;border-radius:6px;
  font-size:12px;font-weight:600;cursor:pointer}
.btn-approve{background:#5cc87830;color:#5cc878}
.btn-reject{background:#e0687830;color:#e06878}
.btn-reply{background:#38b2c930;color:#38b2c9}

/* Log Panel */
#logPanel{flex:1;min-height:120px;max-height:200px;overflow-y:auto;
  background:#0a0810;border-radius:6px;padding:8px;margin:0 12px 6px;
  font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.6}
#logPanel::-webkit-scrollbar{width:3px}
#logPanel::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.log-line{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-time{color:#ffffff30}
.log-tag{font-weight:700;padding:1px 4px;border-radius:3px;font-size:10px}

/* Controls */
#controls{display:flex;align-items:center;gap:6px;padding:8px 12px}
#controls button{padding:5px 12px;border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--text);font-size:12px;cursor:pointer;font-weight:600}
#controls button:hover{background:#ffffff10}
#controls button.active{background:var(--accent);color:#1a1520;border-color:var(--accent)}

/* ===== PHASE OVERLAY ===== */
#phaseOverlay{position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(26,21,32,.85);z-index:20;pointer-events:none;
  opacity:0;transition:opacity .3s}
#phaseOverlay.visible{opacity:1}
#phaseOverlay .phase-num{font-size:60px;font-weight:700;color:var(--accent);
  font-family:'JetBrains Mono',monospace}
#phaseOverlay .phase-name{font-size:22px;font-weight:700;margin-top:8px}

/* ===== LIVE CONTROL PANEL ===== */
#livePanel{display:none;padding:8px 12px;background:#0d0a12;border-top:1px solid var(--border)}
#livePanel.visible{display:block}
#livePanel .live-title{font-size:11px;font-weight:700;color:#4ade80;text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
#livePanel .live-title .dot{width:6px;height:6px;border-radius:50%;background:#666}
#livePanel .live-title .dot.connected{background:#4ade80;animation:pulse 1.5s infinite}
#livePanel .live-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
#livePanel input{flex:1;background:#ffffff08;border:1px solid var(--border);
  border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;
  font-family:'JetBrains Mono',monospace;outline:none}
#livePanel input:focus{border-color:#4ade80}
#livePanel input::placeholder{color:#ffffff30}
#livePanel button{padding:4px 10px;border:1px solid #4ade8040;border-radius:6px;
  background:#4ade8015;color:#4ade80;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
#livePanel button:hover{background:#4ade8025}
#livePanel button.danger{border-color:#e0687840;background:#e0687815;color:#e06878}
#livePanel button.danger:hover{background:#e0687825}
#livePanel .live-status{font-size:11px;color:#ffffff50;margin-top:2px}

/* ===== RESPONSIVE ===== */
@media(max-width:800px){
  #main{grid-template-columns:1fr}
  #sidePanel{display:none}
}
</style>
</head>
<body>
<div id="app">
  <!-- ===== HEADER ===== -->
  <header id="header">
    <div class="logo">&#x1F9EA; <span>Code-Lab</span> &#x2605; 司令室</div>
    <div class="phase-display" id="phaseText">Phase 1: 設計</div>
    <div class="right">
      <div class="status-pill"><div class="status-dot" id="statusDot"></div><span id="statusLabel">指示待ち</span></div>
      <div id="clock">00:00:00</div>
    </div>
  </header>
  <!-- ===== MAIN ===== -->
  <main id="main">
    <div id="canvasArea">
      <canvas id="canvas"></canvas>
      <div id="statsBar">
        <div class="stat-item"><span class="icon">&#x1F4C4;</span><span class="val" id="statFiles">0</span></div>
        <div class="stat-item"><span class="icon">&#x270F;&#xFE0F;</span><span class="val" id="statLines">0</span></div>
        <div class="stat-item"><span class="icon">&#x1F9EA;</span><span class="val" id="statTests">0</span></div>
        <div class="stat-item"><span class="icon">&#x1F41B;</span><span class="val" id="statBugs">0</span></div>
        <div class="stat-item"><span class="icon">&#x1F504;</span><span class="val" id="statPhase">1/6</span></div>
      </div>
      <div id="phaseOverlay"><div class="phase-num"></div><div class="phase-name"></div></div>
      <div id="commandBar">
        <div class="label">社長&#x25B8;</div>
        <button id="btnAttach" title="ファイル添付">＋</button>
        <div id="attachPreview"><div class="file-list" id="fileList"></div></div>
        <input type="file" id="fileInput" multiple accept=".md,.txt,.js,.ts,.html,.css,.json,.py,.java,.c,.cpp,.h,.xml,.yaml,.yml,.csv,.sh,.png,.jpg,.jpeg,.gif,.webp,.svg" style="display:none">
        <input type="text" id="cmdInput" placeholder="開発指示を入力してください...">
        <button id="cmdSend">&#x25B6;</button>
      </div>
    </div>
    <div id="sidePanel">
      <!-- Boss Card -->
      <div class="panel-section">
        <div class="boss-card">
          <div class="boss-avatar">&#x1F451;</div>
          <div class="boss-info"><div class="name">社長 &#x2014; あなた</div><div class="role">最高責任者</div></div>
        </div>
      </div>
      <!-- Agent List -->
      <div class="panel-section" id="agentListSection">
        <div class="section-title">AI従業員</div>
        <div id="agentList"></div>
      </div>
      <!-- Confirm Section -->
      <div class="panel-section" id="confirmSection">
        <div class="section-title">&#x1F4E9; 確認依頼 <span class="confirm-badge" id="confirmBadge">0件</span></div>
        <div id="confirmList"></div>
      </div>
      <!-- Log Panel -->
      <div class="panel-section" style="flex:1;display:flex;flex-direction:column;padding-bottom:0">
        <div class="section-title">作業ログ</div>
        <div id="logPanel"></div>
      </div>
      <!-- Controls -->
      <div id="controls">
        <button id="btnDemo" class="active">&#x25B6; デモ</button>
        <button id="btnLive">&#x1F4E1; Live</button>
      </div>
      <!-- Live状態表示（シンプル） -->
      <div id="livePanel">
        <div class="live-title"><span class="dot" id="liveDot"></span><span id="liveStatus">未接続</span></div>
      </div>
    </div>
  </main>
</div>

<script>
// ============================================================
// SECTION: CONSTANTS
// ============================================================
let TILE_W = 64, TILE_H = 32, Z_SCALE = 30;
const GRID_W = 12, GRID_H = 10;
let OFFSET_X = 400, OFFSET_Y = 140;
// タイルサイズの基準値（resizeCanvasで動的計算）
const BASE_TILE_W = 64, BASE_TILE_H = 32, BASE_Z = 30;
// ズーム＆パン

const PALETTE = {
  floor:'#e8dcc8', floorAlt:'#ddd0bc',
  wallBack:'#f5f0e8', wallSide:'#ebe4d8', wallAccent:'#c8b8a0',
  carpet:'#6b8fa3',
  deskTop:'#d4c4a8', deskLeg:'#b8a888',deskFront:'#c4b498',
  chairSeat:'#4a5568', chairBack:'#2d3748',
  sky:'#87ceeb', glass:'#d4eaf7',
  monitor:'#1a1a2e', monitorFrame:'#333',
  uiBg:'#1a1520', uiPanel:'#1e1628', uiAccent:'#c8973e', uiText:'#e8dcc8'
};

const AGENT_DEFS = [
  {id:'lead',      name:'リード',       role:'全体設計・進行管理', color:'#e6a532', shirt:'#2c3e6b', emoji:'📋'},
  {id:'developer', name:'デベロッパー', role:'コード実装・ビルド', color:'#5cc878', shirt:'#3b7dd8', emoji:'⌨️'},
  {id:'tester',    name:'テスター',     role:'検証・動作確認',     color:'#38b2c9', shirt:'#7b5ea7', emoji:'🧪'},
  {id:'debugger',  name:'デバッガー',   role:'エラー調査・修正',   color:'#e06878', shirt:'#c0392b', emoji:'🔍'},
  {id:'reviewer',  name:'レビュアー',   role:'コード品質・設計レビュー', color:'#9b8ec4', shirt:'#c8a832', emoji:'👀'},
  {id:'ui-designer',name:'UIデザイナー',role:'UI/UX・スタイリング',color:'#e88ec4', shirt:'#d4729a', emoji:'🎨'},
  {id:'qa',        name:'QA',           role:'最終品質保証',       color:'#7ec88e', shirt:'#27ae60', emoji:'✅'},
  {id:'security',  name:'セキュリティ', role:'秘密鍵・個人情報・公開安全性チェック', color:'#e84855', shirt:'#8b0000', emoji:'🛡️'}
];

const PHASE_ACTIVE = {
  1:['lead'],
  2:['lead','developer','ui-designer'],
  3:['tester','reviewer'],
  4:['debugger','developer'],
  5:['tester','qa','security'],
  6:['lead','developer','security']
};
const PHASE_NAMES = {1:'設計',2:'実装',3:'レビュー',4:'バグ修正',5:'最終QA',6:'デプロイ'};

// Agent grid positions (x, y) in office grid
const AGENT_POS = {
  'lead':       {gx:2,  gy:2.5},
  'developer':  {gx:4.2,gy:2.5},
  'ui-designer':{gx:6.8,gy:2.5},
  'reviewer':   {gx:9,  gy:2.5},
  'tester':     {gx:2,  gy:5.5},
  'debugger':   {gx:4.2,gy:5.5},
  'qa':         {gx:6.8,gy:5.5},
  'security':   {gx:9,  gy:5.5}
};
const BOSS_POS = {gx:8, gy:8.5};

// ============================================================
// SECTION: STATE
// ============================================================
const state = {
  mode:'demo', // 'demo' or 'live'
  speed:1,
  phase:1,
  running:false,
  stats:{files:0,lines:0,tests:0,bugs:0},
  agents:{},
  confirmQueue:[],
  confirmIdCounter:0,
  logs:[],
  eventIndex:0,
  eventTimer:null,
  phaseOverlayVisible:false,
  time:0 // elapsed ms
};

// Init agent states
AGENT_DEFS.forEach(a => {
  state.agents[a.id] = {
    active:false, working:false, action:'', thought:'', animPhase:0
  };
});

// Effects arrays
const particles = [];
const floatingEmojis = [];

// ============================================================
// SECTION: CONNECTION INTERFACE (Phase 2 ready)
// ============================================================
let CONNECTION_MODE = 'simulation'; // 'simulation' | 'websocket'
let ws = null;
let liveConnected = false;
let pendingFiles = []; // 添付ファイル一時保管

function sendCommand(text) {
  if (CONNECTION_MODE === 'websocket' && ws && ws.readyState === WebSocket.OPEN) {
    const filesLabel = pendingFiles.length ? ' [+' + pendingFiles.length + 'ファイル]' : '';
    addLog('boss', '\u{1F4E2} ' + text + filesLabel);
    const payload = { type: 'command', text };
    if (pendingFiles.length) {
      payload.files = pendingFiles.map(f => ({ name: f.name, type: f.type, data: f.data }));
    }
    ws.send(JSON.stringify(payload));
    clearPendingFiles();
  } else {
    simulateResponse(text);
    clearPendingFiles();
  }
}

function clearPendingFiles() {
  pendingFiles = [];
  const preview = document.getElementById('attachPreview');
  const fileList = document.getElementById('fileList');
  if (preview) preview.classList.remove('show');
  if (fileList) fileList.innerHTML = '';
}

function addPendingFile(file) {
  const MAX_SIZE = 5 * 1024 * 1024; // 5MB制限
  if (file.size > MAX_SIZE) {
    addLog('boss', '\u274C ファイルが大きすぎます（5MB以下）: ' + file.name);
    return;
  }
  const reader = new FileReader();
  const isImage = file.type.startsWith('image/');
  if (isImage) {
    reader.readAsDataURL(file);
  } else {
    reader.readAsText(file);
  }
  reader.onload = () => {
    pendingFiles.push({ name: file.name, type: isImage ? 'image' : 'text', data: reader.result });
    renderFilePreview();
  };
}

function renderFilePreview() {
  const preview = document.getElementById('attachPreview');
  const fileList = document.getElementById('fileList');
  fileList.innerHTML = '';
  pendingFiles.forEach((f, i) => {
    const tag = document.createElement('span');
    tag.className = 'file-tag';
    const icon = f.type === 'image' ? '\u{1F5BC}' : '\u{1F4C4}';
    tag.innerHTML = icon + ' ' + f.name + ' <span class="remove" data-idx="' + i + '">\u2715</span>';
    fileList.appendChild(tag);
  });
  preview.classList.toggle('show', pendingFiles.length > 0);
  // 削除ボタン
  fileList.querySelectorAll('.remove').forEach(btn => {
    btn.addEventListener('click', (e) => {
      pendingFiles.splice(parseInt(e.target.dataset.idx), 1);
      renderFilePreview();
    });
  });
}

// DevEvent interface (Phase 2 compatible)
function processDevEvent(ev) {
  // Update phase
  if (ev.phase && ev.phase !== state.phase) {
    showPhaseOverlay(ev.phase);
    state.phase = ev.phase;
    updateActiveAgents();
  }
  // Update agent
  if (ev.a || ev.agent) {
    const aid = ev.a || ev.agent;
    const ag = state.agents[aid];
    if (ag) {
      // Liveモード: エージェントを自動アクティベート
      if (CONNECTION_MODE === 'websocket' && !ag.active) {
        ag.active = true;
        ag._justActivated = true;
        ag._activatedTime = state.time;
      }
      ag.working = true;
      ag.action = ev.t || ev.action || '';
      ag.thought = ev.th || ev.thought || '';
    }
  }
  // Update stats
  const statKey = ev.s || ev.stat;
  const statN = ev.n || ev.statDelta || 0;
  if (statKey && state.stats[statKey] !== undefined) {
    state.stats[statKey] = Math.max(0, state.stats[statKey] + statN);
  }
  // Log
  const aid2 = ev.a || ev.agent || 'system';
  addLog(aid2, ev.t || ev.action || '');
  // Emoji
  if (ev.e || ev.emoji) {
    const eid = ev.a || ev.agent || 'lead';
    spawnFloatingEmoji(eid, ev.e || ev.emoji);
  }
  // Particles
  if (ev.a || ev.agent) spawnParticles(ev.a || ev.agent);
  // Confirm
  if (ev.confirm) addConfirm(ev.a || ev.agent || 'lead', ev.confirm.msg);
  // Update UI
  updateUI();
}

// ============================================================
// SECTION: CANVAS & ISO UTILS
// ============================================================
const canvas = document.getElementById('canvas');
const c = canvas.getContext('2d');
let lastFrame = 0;

function resizeCanvas() {
  const area = document.getElementById('canvasArea');
  const cmdBar = document.getElementById('commandBar');
  const cmdH = cmdBar ? cmdBar.offsetHeight : 44;
  canvas.width = area.clientWidth;
  canvas.height = Math.max(300, area.clientHeight - cmdH);

  // 矩形トップダウン: 壁の表示領域(上部15%) + 床領域(下部85%)
  const WALL_RATIO = 0.15;
  const wallH = canvas.height * WALL_RATIO;
  const floorH = canvas.height - wallH;

  // セルサイズ: キャンバスを隙間なく埋める
  TILE_W = Math.round(canvas.width / GRID_W);
  TILE_H = Math.round(floorH / GRID_H);
  Z_SCALE = Math.round(wallH / 3.2);

  // オフセット: 床の左上を壁の真下に配置
  OFFSET_X = Math.round((canvas.width - GRID_W * TILE_W) / 2);
  OFFSET_Y = Math.round(wallH + (floorH - GRID_H * TILE_H) / 2);
}

// 矩形トップダウン座標変換（旧アイソメトリック → 矩形）
function toIso(x, y, z) {
  return {
    sx: x * TILE_W + OFFSET_X,
    sy: y * TILE_H - (z || 0) * Z_SCALE + OFFSET_Y
  };
}

function rrect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

// ピクセルスケール係数（タイル拡大に連動）
function ps(v) { return v * TILE_W / BASE_TILE_W; }

function darken(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, Math.floor(r * amt));
  g = Math.max(0, Math.floor(g * amt));
  b = Math.max(0, Math.floor(b * amt));
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

// ============================================================
// SECTION: ISOMETRIC DRAWING - PRIMITIVES
// ============================================================
// 矩形タイル描画（旧ダイヤモンド → 長方形）
function drawDiamond(cx, cy, color) {
  c.fillStyle = color;
  c.fillRect(cx - TILE_W / 2, cy - TILE_H / 2, TILE_W, TILE_H);
}

// 矩形ボックス描画（上面 + 前面の2面で2.5D表現）
function drawIsoBox(x, y, z, w, d, h, topC, frontC, rightC) {
  const tw = w * TILE_W, td = d * TILE_H, th = h * Z_SCALE;
  // Front face (y+d側、上面の下に見える面)
  if (th > 0.5) {
    const ft = toIso(x, y + d, z + h);
    c.fillStyle = frontC;
    c.fillRect(ft.sx, ft.sy, tw, th);
  }
  // Top face (上から見た面)
  const tl = toIso(x, y, z + h);
  c.fillStyle = topC;
  c.fillRect(tl.sx, tl.sy, tw, td);
  // 右辺線（奥行き感の補助）
  if (th > 0.5) {
    const rt = toIso(x + w, y, z + h);
    c.fillStyle = rightC;
    c.fillRect(rt.sx, rt.sy, Math.max(1, tw * 0.03), td + th);
  }
}

function drawShadow(x, y, rx, ry) {
  const p = toIso(x, y, 0);
  c.fillStyle = 'rgba(0,0,0,0.12)';
  c.beginPath();
  c.ellipse(p.sx, p.sy + ps(2), ps(rx), ps(ry), 0, 0, Math.PI * 2);
  c.fill();
}

// ============================================================
// SECTION: OFFICE DRAWING
// ============================================================
function drawFloor() {
  // 矩形グリッド: キャンバスを隙間なく埋める
  for (let gy = 0; gy < GRID_H; gy++) {
    for (let gx = 0; gx < GRID_W; gx++) {
      const p = toIso(gx + 0.5, gy + 0.5, 0);
      const col = (gx + gy) % 2 === 0 ? PALETTE.floor : PALETTE.floorAlt;
      drawDiamond(p.sx, p.sy, col);
    }
  }
}

function drawWalls() {
  const WALL_H = 3.2;
  const wallTL = toIso(0, 0, WALL_H);
  const wallBR = toIso(GRID_W, 0, 0);
  const wallW = wallBR.sx - wallTL.sx;
  const wallHpx = wallBR.sy - wallTL.sy;

  // 背面壁 — 床の上のバンド（全幅）
  c.fillStyle = PALETTE.wallBack;
  c.fillRect(wallTL.sx, wallTL.sy, wallW, wallHpx);

  // 巾木（背面）
  const bbH = 0.2;
  const bbTop = toIso(0, 0, bbH);
  c.fillStyle = PALETTE.wallAccent;
  c.fillRect(bbTop.sx, bbTop.sy, wallW, wallBR.sy - bbTop.sy);

  // 窓 (列 4-7)
  for (let gx = 4; gx < 8; gx++) {
    const wTL = toIso(gx + 0.1, 0, 2.6);
    const wBR = toIso(gx + 0.9, 0, 1.0);
    const wx = wTL.sx, wy = wTL.sy;
    const ww = wBR.sx - wTL.sx, wh = wBR.sy - wTL.sy;
    // 空
    const skyGrad = c.createLinearGradient(wx, wy, wx, wy + wh);
    skyGrad.addColorStop(0, '#87ceeb');
    skyGrad.addColorStop(1, '#b8e6ff');
    c.fillStyle = skyGrad;
    c.fillRect(wx, wy, ww, wh);
    // ガラス反射
    c.fillStyle = 'rgba(255,255,255,0.15)';
    c.fillRect(wx, wy, ww, wh);
    // フレーム
    c.strokeStyle = PALETTE.wallAccent;
    c.lineWidth = 1.5;
    c.strokeRect(wx, wy, ww, wh);
    // 桟
    const midY = wy + wh / 2;
    c.beginPath(); c.moveTo(wx, midY); c.lineTo(wx + ww, midY);
    c.strokeStyle = '#c8b8a0'; c.lineWidth = 1; c.stroke();
  }

  // 左壁 — 細ストリップ
  const leftW = Math.max(4, TILE_W * 0.06);
  c.fillStyle = PALETTE.wallSide;
  c.fillRect(wallTL.sx - leftW, wallTL.sy, leftW, GRID_H * TILE_H + wallHpx);
  // 巾木（左壁）
  c.fillStyle = PALETTE.wallAccent;
  c.fillRect(wallTL.sx - leftW, wallTL.sy, leftW * 0.4, GRID_H * TILE_H + wallHpx);
}

function drawDesk(gx, gy, isBoss) {
  const w = isBoss ? 2.2 : 1.5;
  const d = isBoss ? 1.0 : 0.7;
  const h = 0.55;
  const ox = gx - w / 2, oy = gy - d / 2;
  // Shadow
  drawShadow(gx, gy + d / 2 + 0.1, 22, 8);
  // Legs
  const legH = 0.35, legW = 0.08;
  drawIsoBox(ox + 0.1, oy + 0.1, 0, legW, legW, legH, PALETTE.deskLeg, darken(PALETTE.deskLeg, 0.8), darken(PALETTE.deskLeg, 0.7));
  drawIsoBox(ox + w - 0.18, oy + 0.1, 0, legW, legW, legH, PALETTE.deskLeg, darken(PALETTE.deskLeg, 0.8), darken(PALETTE.deskLeg, 0.7));
  drawIsoBox(ox + 0.1, oy + d - 0.18, 0, legW, legW, legH, PALETTE.deskLeg, darken(PALETTE.deskLeg, 0.8), darken(PALETTE.deskLeg, 0.7));
  drawIsoBox(ox + w - 0.18, oy + d - 0.18, 0, legW, legW, legH, PALETTE.deskLeg, darken(PALETTE.deskLeg, 0.8), darken(PALETTE.deskLeg, 0.7));
  // Desktop
  drawIsoBox(ox, oy, legH, w, d, 0.06, PALETTE.deskTop, PALETTE.deskFront, darken(PALETTE.deskTop, 0.85));
  if (isBoss) {
    // Gold trim
    drawIsoBox(ox, oy, legH + 0.06, w, d, 0.015, '#c8973e', '#a0782e', '#8a6828');
  }
}

function drawMonitor(gx, gy, agentId, isActive) {
  const p = toIso(gx, gy - 0.15, 0.55);
  const S = ps(1);
  // Stand
  c.fillStyle = '#555';
  c.fillRect(p.sx - S*2, p.sy - S*8, S*4, S*8);
  // Base
  c.fillStyle = '#444';
  c.beginPath();
  c.ellipse(p.sx, p.sy, S*6, S*3, 0, 0, Math.PI * 2);
  c.fill();
  // Screen frame
  const sw = S*24, sh = S*16;
  rrect(p.sx - sw/2 - S, p.sy - sh - S*10, sw + S*2, sh + S*2, S*2);
  c.fillStyle = PALETTE.monitorFrame;
  c.fill();
  // Screen
  rrect(p.sx - sw/2, p.sy - sh - S*9, sw, sh, S);
  if (isActive) {
    c.fillStyle = '#0d1117';
    c.fill();
    const t = state.time / 1000;
    c.save();
    c.beginPath();
    rrect(p.sx - sw/2, p.sy - sh - S*9, sw, sh, S);
    c.clip();
    for (let i = 0; i < 6; i++) {
      const lw = S*(6 + Math.sin(t + i * 1.3) * 4);
      const agent = AGENT_DEFS.find(a => a.id === agentId);
      c.fillStyle = agent ? agent.color + '80' : '#5cc87880';
      c.fillRect(p.sx - sw/2 + S*2, p.sy - sh - S*7 + i * S*2.5, lw, S*1.5);
    }
    if (Math.sin(t * 4) > 0) {
      c.fillStyle = '#fff';
      c.fillRect(p.sx - sw/2 + S*10, p.sy - sh - S*5, S, S*2);
    }
    c.restore();
  } else {
    c.fillStyle = '#111118';
    c.fill();
    const t2 = state.time / 2000;
    c.fillStyle = '#333355';
    c.beginPath();
    c.arc(p.sx + Math.sin(t2) * S*6, p.sy - sh/2 - S*5 + Math.cos(t2*1.3) * S*4, S*2, 0, Math.PI*2);
    c.fill();
  }
}

function drawChair(gx, gy, isBoss) {

  // Seat
  drawIsoBox(gx - sw / 2, gy + 0.35 - sw / 2, seatH - 0.04, sw, sw, 0.04,

  if (isBoss) {

    drawIsoBox(gx - sw / 2, gy + 0.35 - sw / 2 + 0.05, seatH, 0.05, 0.25, 0.12,

    drawIsoBox(gx + sw / 2 - 0.05, gy + 0.35 - sw / 2 + 0.05, seatH, 0.05, 0.25, 0.12,

  }
}

function drawBookshelf(gx, gy) {

function drawPlant(gx, gy) {
  const S = ps(1);
  drawShadow(gx, gy, 10, 5);
  drawIsoBox(gx - 0.15, gy - 0.15, 0, 0.3, 0.3, 0.35, '#b5651d', '#a0571a', '#8b4a15');
  drawIsoBox(gx - 0.12, gy - 0.12, 0.35, 0.24, 0.24, 0.03, '#5a3e2b', '#4d3425', '#3f2a1e');
  const t = state.time / 1500;
  const leaf = toIso(gx, gy, 0.55);
  c.save();
  const sway = Math.sin(t) * 2*S;
  for (let i = 0; i < 5; i++) {
    const angle = (i / 5) * Math.PI * 2 + t * 0.3;
    const lx = leaf.sx + Math.cos(angle) * S*(10 + Math.sin(t + i) * 2) + sway;
    const ly = leaf.sy + Math.sin(angle) * 5*S - 5*S;
    c.fillStyle = i % 2 === 0 ? '#4a9e5c' : '#3d8a4e';
    c.beginPath();
    c.ellipse(lx, ly, 7*S, 4*S, angle, 0, Math.PI * 2);
    c.fill();
  }
  c.strokeStyle = '#3d7a3e';
  c.lineWidth = 1.5*S;
  c.beginPath();
  c.moveTo(leaf.sx, leaf.sy + 8*S);
  c.lineTo(leaf.sx + sway * 0.3, leaf.sy - 4*S);
  c.stroke();
  c.restore();
}

function drawCoffeeTable(gx, gy) {
  drawShadow(gx + 0.3, gy + 0.25, 14, 6);
  drawIsoBox(gx, gy, 0, 0.8, 0.5, 0.05, '#b8a888', '#a89878', '#988868');
  // Legs
  const legPos = [[0.05,0.05],[0.7,0.05],[0.05,0.4],[0.7,0.4]];
  legPos.forEach(([lx, ly]) => {
    drawIsoBox(gx + lx, gy + ly, 0.05, 0.05, 0.05, 0.2, '#a89878', '#988868', '#887858');
  });
  drawIsoBox(gx + 0.05, gy + 0.05, 0.25, 0.7, 0.4, 0.03, PALETTE.deskTop, PALETTE.deskFront, darken(PALETTE.deskTop, 0.85));
  // Coffee mug
  const mugP = toIso(gx + 0.55, gy + 0.2, 0.32);
  c.fillStyle = '#fff';
  c.beginPath();
  c.ellipse(mugP.sx, mugP.sy, 4, 2.5, 0, 0, Math.PI * 2);
  c.fill();
  c.fillStyle = '#eee';
  c.fillRect(mugP.sx - 3, mugP.sy - 1, 6, 5);
  c.fillStyle = '#6b4226';
  c.beginPath();
  c.ellipse(mugP.sx, mugP.sy, 3, 1.8, 0, 0, Math.PI * 2);
  c.fill();
  // Steam
  const st = state.time / 800;
  c.strokeStyle = 'rgba(255,255,255,0.25)';
  c.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    c.beginPath();
    const sx = mugP.sx - 2 + i * 2;
    c.moveTo(sx, mugP.sy - 3);
    c.quadraticCurveTo(sx + Math.sin(st + i) * 3, mugP.sy - 8, sx + Math.sin(st + i + 1) * 2, mugP.sy - 13);
    c.stroke();
  }
}

function drawServerRack(gx, gy) {
  drawShadow(gx + 0.2, gy + 0.25, 12, 6);
  drawIsoBox(gx, gy, 0, 0.5, 0.5, 1.6, '#2d3748', '#252f3f', '#1e2736');
  // LED lights
  const t = state.time / 300;
  for (let i = 0; i < 6; i++) {
    const lp = toIso(gx + 0.12, gy, 0.2 + i * 0.22);
    const colors = ['#4ade80', '#60a5fa', '#fbbf24'];
    const ci = Math.floor(Math.sin(t + i * 1.7) * 1.5 + 1.5) % 3;
    const brightness = Math.sin(t * 2 + i * 0.8) > 0 ? 1 : 0.3;
    c.fillStyle = colors[ci];
    c.globalAlpha = brightness;
    c.beginPath();
    c.arc(lp.sx + 3, lp.sy + 1, 1.5, 0, Math.PI * 2);
    c.fill();
    c.globalAlpha = 1;
  }
}

function drawWhiteboard(gx, gy) {
  // Board on wall (side view)
  drawIsoBox(gx, gy, 0.6, 1.5, 0.06, 1.2, '#f8f8f8', '#e8e8e8', '#d8d8d8');

function drawCat(gx, gy) {
  const p = toIso(gx, gy, 0.05);
  // Body
  c.fillStyle = '#f5a623';
  c.beginPath();
  c.ellipse(p.sx, p.sy - 2, 8, 5, 0.1, 0, Math.PI * 2);
  c.fill();
  // Head
  c.beginPath();
  c.arc(p.sx + 7, p.sy - 4, 4, 0, Math.PI * 2);
  c.fill();
  // Ears
  c.beginPath();
  c.moveTo(p.sx + 5, p.sy - 8); c.lineTo(p.sx + 7, p.sy - 12); c.lineTo(p.sx + 9, p.sy - 8);
  c.fill();
  // Tail
  c.strokeStyle = '#f5a623';
  c.lineWidth = 2;
  const tt = state.time / 1200;
  c.beginPath();
  c.moveTo(p.sx - 7, p.sy - 2);
  c.quadraticCurveTo(p.sx - 12, p.sy - 8 + Math.sin(tt) * 3, p.sx - 10, p.sy - 12);
  c.stroke();
  // Zzz
  const zt = state.time / 600;
  c.font = '8px Inter';
  c.fillStyle = 'rgba(255,255,255,0.4)';
  const zy = p.sy - 14 - Math.sin(zt) * 3;
  c.fillText('z', p.sx + 10, zy);
  c.fillText('Z', p.sx + 14, zy - 5);
  c.fillText('Z', p.sx + 11, zy - 10);
}

function drawWallClock(gx, gy) {
  const CLOCK_Z = 2.2;
  const p = toIso(gx, gy, CLOCK_Z);
  // Back plate (on back wall, so draw as circle)
  c.fillStyle = '#fff';
  c.beginPath();
  c.arc(p.sx, p.sy, 12, 0, Math.PI * 2);
  c.fill();
  c.strokeStyle = '#c8b8a0';
  c.lineWidth = 1.5;
  c.stroke();
  // Hands
  const now = new Date();
  const h = now.getHours() % 12, m = now.getMinutes(), s = now.getSeconds();
  // Hour hand
  const ha = (h + m / 60) * Math.PI / 6 - Math.PI / 2;
  c.strokeStyle = '#333';
  c.lineWidth = 2;
  c.beginPath();
  c.moveTo(p.sx, p.sy);
  c.lineTo(p.sx + Math.cos(ha) * 6, p.sy + Math.sin(ha) * 6);
  c.stroke();
  // Minute hand
  const ma = (m + s / 60) * Math.PI / 30 - Math.PI / 2;
  c.lineWidth = 1.5;
  c.beginPath();
  c.moveTo(p.sx, p.sy);
  c.lineTo(p.sx + Math.cos(ma) * 8, p.sy + Math.sin(ma) * 8);
  c.stroke();
  // Second hand
  const sa = s * Math.PI / 30 - Math.PI / 2;
  c.strokeStyle = '#e06878';
  c.lineWidth = 0.8;
  c.beginPath();
  c.moveTo(p.sx, p.sy);
  c.lineTo(p.sx + Math.cos(sa) * 9, p.sy + Math.sin(sa) * 9);
  c.stroke();
  // Center dot
  c.fillStyle = '#333';
  c.beginPath();
  c.arc(p.sx, p.sy, 1.5, 0, Math.PI * 2);
  c.fill();
}

// SECTION: CHARACTER DRAWING
// ============================================================
function drawCharacter(agentDef, gx, gy, isActive, isBoss) {
  const ag = state.agents[agentDef.id];
  const t = state.time / 1000;
  const S = ps(1);
  const bobY = (isActive && ag && ag.working) ? Math.sin(t * 3 + gx) * S*1.2 : 0;
  // 椅子の座面位置に合わせる (gy+0.35 = 椅子のy, z=0.32 = 座面の高さ)
  const p = toIso(gx, gy + 0.35, 0.32);
  const sx = p.sx, sy = p.sy + bobY;
  const sc = (isBoss ? 1.3 : 1.15) * S;

  const alpha = isActive ? 1.0 : 0.4;
  c.globalAlpha = alpha;

  // Legs (pants) — 座った脚
  c.fillStyle = '#3d4050';
  c.fillRect(sx - 6*sc, sy - 4*sc, 5*sc, 6*sc);
  c.fillRect(sx + 1*sc, sy - 4*sc, 5*sc, 6*sc);
  // Shoes
  c.fillStyle = '#2a2a2a';
  c.fillRect(sx - 7*sc, sy + 2*sc, 6*sc, 2.5*sc);
  c.fillRect(sx + 1*sc, sy + 2*sc, 6*sc, 2.5*sc);

  // Body (shirt)
  const shirtColor = isBoss ? '#2d3748' : agentDef.shirt;
  c.fillStyle = shirtColor;
  rrect(sx - 9*sc, sy - 20*sc, 18*sc, 17*sc, 3*S);
  c.fill();

  // Arms
  c.fillStyle = shirtColor;
  const armWave = (isActive && ag && ag.working) ? Math.sin(t * 6 + gx * 2) * 2*S : 0;
  c.fillRect(sx - 14*sc, sy - 16*sc + armWave, 6*sc, 5*sc);
  c.fillRect(sx + 8*sc, sy - 16*sc - armWave, 6*sc, 5*sc);
  // Hands
  c.fillStyle = '#f0d0b0';
  c.beginPath(); c.arc(sx - 15*sc, sy - 13*sc + armWave, 3*sc, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(sx + 15*sc, sy - 13*sc - armWave, 3*sc, 0, Math.PI*2); c.fill();

  // Neck (後ろから少し見える)
  c.fillStyle = '#f0d0b0';
  c.fillRect(sx - 2.5*sc, sy - 22*sc, 5*sc, 4*sc);

  // Head — 後頭部（PC画面に向かっているので背中側）
  const hairColor = isBoss ? '#1a1a2e' : '#3d2817';
  // 後頭部ベース（髪で覆われた丸い頭）
  c.fillStyle = hairColor;
  c.beginPath(); c.arc(sx, sy - 27*sc, 8*sc, 0, Math.PI*2); c.fill();
  // 耳（左右に肌色で小さく）
  c.fillStyle = '#f0d0b0';
  c.beginPath(); c.arc(sx - 8*sc, sy - 26*sc, 2*sc, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(sx + 8*sc, sy - 26*sc, 2*sc, 0, Math.PI*2); c.fill();
  // 髪の毛ディテール（後頭部のふくらみ）
  c.fillStyle = isBoss ? '#12122a' : '#2e1c0f';
  c.beginPath(); c.arc(sx, sy - 28.5*sc, 6.5*sc, -Math.PI*0.8, Math.PI*0.8); c.fill();

  if (isBoss) {
    // 社長：襟（後ろから見える白い襟元）
    c.fillStyle = '#e8e0d0';
    c.fillRect(sx - 5*sc, sy - 20.5*sc, 10*sc, 2.5*sc);
  }

  c.globalAlpha = 1;

  drawRoleTag(sx, sy - 42*sc, agentDef, isActive, isBoss);

  if (isActive && ag && ag.thought) {
    drawThoughtBubble(sx, sy - 56*sc, ag.thought, agentDef.color);
  }

  // Confirm icon
  if (state.confirmQueue.some(cq => cq.from === agentDef.id)) {
    const blinkAlpha = Math.sin(t * 4) > 0 ? 1 : 0.3;
    c.globalAlpha = blinkAlpha;
    c.font = Math.round(14*S) + 'px sans-serif';
    c.fillText('\u{1F4E9}', sx + 14*S, sy - 46*sc);
    c.globalAlpha = 1;
  }

  // Activation glow
  if (isActive && ag && ag._justActivated) {
    const glowAlpha = Math.max(0, 1 - (state.time - ag._activatedTime) / 2000);
    if (glowAlpha > 0) {
      c.strokeStyle = agentDef.color;
      c.lineWidth = 2*S;
      c.globalAlpha = glowAlpha * 0.6;
      c.beginPath();
      c.ellipse(sx, sy - 12*S, S*(24 + glowAlpha*10), S*(14 + glowAlpha*5), 0, 0, Math.PI*2);
      c.stroke();
      c.globalAlpha = 1;
    } else {
      ag._justActivated = false;
    }
  }
}

function drawRoleTag(sx, sy, agentDef, isActive, isBoss) {
  const S = ps(1);
  const label = isBoss ? '\u{1F451} 社長' : agentDef.emoji + ' ' + agentDef.name;
  const fontSize = Math.max(9, Math.round(10 * S));
  c.font = '600 ' + fontSize + 'px "Noto Sans JP", sans-serif';
  const tw = c.measureText(label).width;
  const px = 6*S, py = 3*S;
  const tagAlpha = isActive ? 0.95 : 0.4;
  c.globalAlpha = tagAlpha;
  const bgColor = isBoss ? '#c8973e' : agentDef.color;
  c.fillStyle = bgColor;
  rrect(sx - tw/2 - px, sy - py - 10*S, tw + px*2, 14*S + py, 7*S);
  c.fill();
  c.fillStyle = '#fff';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText(label, sx, sy - 6*S);
  c.textAlign = 'start';
  c.textBaseline = 'alphabetic';
  c.globalAlpha = 1;
}

function drawThoughtBubble(sx, sy, text, borderColor) {
  const S = ps(1);
  const fontSize = Math.max(8, Math.round(9 * S));
  c.font = '500 ' + fontSize + 'px "Noto Sans JP", sans-serif';
  const maxLineW = 120 * S;
  const maxLines = 3;
  const lineH = fontSize * 1.35;

  // テキストを複数行に折り返し
  const lines = [];
  let remain = text;
  while (remain.length > 0 && lines.length < maxLines) {
    if (c.measureText(remain).width <= maxLineW) {
      lines.push(remain);
      remain = '';
    } else {
      let cut = remain.length;
      while (cut > 1 && c.measureText(remain.slice(0, cut)).width > maxLineW) cut--;
      if (lines.length === maxLines - 1 && remain.length > cut) {
        // 最終行: 末尾を…に
        let t = remain.slice(0, cut);
        while (t.length > 1 && c.measureText(t + '…').width > maxLineW) t = t.slice(0, -1);
        lines.push(t + '…');
        remain = '';
      } else {
        lines.push(remain.slice(0, cut));
        remain = remain.slice(cut);
      }
    }
  }

  const maxTw = Math.max(...lines.map(l => c.measureText(l).width));
  const px = 7*S, py = 4*S;
  const bw = maxTw + px*2;
  const bh = lines.length * lineH + py*2;
  const bx = sx - bw/2;
  const by = sy - bh - 8*S;

  c.fillStyle = 'rgba(255,255,255,0.95)';
  rrect(bx, by, bw, bh, 5*S);
  c.fill();
  c.strokeStyle = borderColor;
  c.lineWidth = 1.5*S;
  rrect(bx, by, bw, bh, 5*S);
  c.stroke();

  // Tail
  c.fillStyle = 'rgba(255,255,255,0.95)';
  c.beginPath();
  c.moveTo(sx - 3*S, by + bh);
  c.lineTo(sx, by + bh + 5*S);
  c.lineTo(sx + 3*S, by + bh);
  c.closePath();
  c.fill();
  c.beginPath();
  c.moveTo(sx - 3*S, by + bh - 0.5);
  c.lineTo(sx, by + bh + 5*S);
  c.lineTo(sx + 3*S, by + bh - 0.5);
  c.strokeStyle = borderColor;
  c.lineWidth = 1.5*S;
  c.stroke();

  // テキスト描画（複数行）
  c.fillStyle = '#333';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  lines.forEach((line, i) => {
    c.fillText(line, sx, by + py + lineH * (i + 0.5));
  });
  c.textAlign = 'start';
  c.textBaseline = 'alphabetic';
}

function spawnParticles(agentId) {
  const pos = AGENT_POS[agentId] || BOSS_POS;
  const p = toIso(pos.gx, pos.gy, 0.5);
  const agent = AGENT_DEFS.find(a => a.id === agentId);
  const col = agent ? agent.color : '#c8973e';
  for (let i = 0; i < 8; i++) {
    particles.push({
      x: p.sx, y: p.sy,
      vx: (Math.random() - 0.5) * 4,
      vy: -Math.random() * 3 - 1,
      life: 1,
      color: col,
      size: Math.random() * 3 + 1
    });
  }
}

function spawnFloatingEmoji(agentId, emoji) {
  const pos = AGENT_POS[agentId] || BOSS_POS;
  const p = toIso(pos.gx, pos.gy, 0.8);
  floatingEmojis.push({
    x: p.sx, y: p.sy - 20,
    emoji: emoji,
    life: 1,
    vy: -0.8
  });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12; // gravity
    p.life -= 0.02;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    c.globalAlpha = p.life;
    c.fillStyle = p.color;
    c.beginPath();
    c.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    c.fill();
  });
  c.globalAlpha = 1;
}

function updateFloatingEmojis(dt) {
  for (let i = floatingEmojis.length - 1; i >= 0; i--) {
    const e = floatingEmojis[i];
    e.y += e.vy;
    e.x += Math.sin(state.time / 300 + i) * 0.3;
    e.life -= 0.012;
    if (e.life <= 0) floatingEmojis.splice(i, 1);
  }
}

function drawFloatingEmojis() {
  floatingEmojis.forEach(e => {
    c.globalAlpha = e.life;
    c.font = '20px sans-serif';
    c.textAlign = 'center';
    c.fillText(e.emoji, e.x, e.y);
    c.textAlign = 'start';
  });
  c.globalAlpha = 1;
}

function showPhaseOverlay(phase) {
  // 開始（Phase 1）と完了（Phase 6）のみオーバーレイ表示
  if (phase !== 1 && phase !== 6) return;
  const overlay = document.getElementById('phaseOverlay');
  if (phase === 6) {
    overlay.querySelector('.phase-num').textContent = '🎊 完了';
    overlay.querySelector('.phase-name').textContent = '開発が完了しました';
  } else {
    overlay.querySelector('.phase-num').textContent = '開発開始';
    overlay.querySelector('.phase-name').textContent = 'プロジェクトを開始します';
  }
  overlay.classList.add('visible');
  setTimeout(() => overlay.classList.remove('visible'), 2500);
}

function spawnCelebration() {
  // Confetti for all agents
  const allIds = AGENT_DEFS.map(a => a.id);
  allIds.forEach(id => {
    for (let i = 0; i < 5; i++) spawnParticles(id);
    spawnFloatingEmoji(id, '🎉');
  });
  spawnFloatingEmoji('boss', '🎉');
}

function draw() {
  try {
    c.clearRect(0, 0, canvas.width, canvas.height);

    // Background — 壁色で全面塗り（隙間なし）
    c.fillStyle = PALETTE.wallBack;
    c.fillRect(0, 0, canvas.width, canvas.height);

    // Floor
    drawFloor();

    // Walls
    drawWalls();
    drawWallClock(9.5, 0);

    // Collect all drawable objects for depth sorting
    const drawables = [];

    // Furniture (static)
    // Bookshelves
    drawables.push({y: 1.2, z: 0, draw: () => drawBookshelf(0.2, 1)});
    drawables.push({y: 1.2, z: 0, draw: () => drawBookshelf(11.3, 1)});

    // Plants
    drawables.push({y: 4.2, z: 0, draw: () => drawPlant(0.4, 4)});
    drawables.push({y: 4.2, z: 0, draw: () => drawPlant(11.2, 4)});
    drawables.push({y: 7.2, z: 0, draw: () => drawPlant(0.4, 7)});
    drawables.push({y: 7.2, z: 0, draw: () => drawPlant(11.2, 7)});
    drawables.push({y: 9.5, z: 0, draw: () => drawPlant(10.2, 9.3)});

    // Sofa area
    drawables.push({y: 8.5, z: 0, draw: () => drawSofa(0.3, 8.2)});
    drawables.push({y: 8.5, z: 0, draw: () => drawCoffeeTable(2.0, 8.3)});
    drawables.push({y: 9.2, z: 0, draw: () => drawCat(2.8, 9.2)});

    // Server rack
    drawables.push({y: 8.5, z: 0, draw: () => drawServerRack(11, 8.2)});

    // Whiteboard
    drawables.push({y: 5.8, z: 0, draw: () => drawWhiteboard(9.5, 5.5)});

    // Agent workstations（モニター→デスク→椅子→キャラの奥→手前順で描画）
    AGENT_DEFS.forEach(agentDef => {
      const pos = AGENT_POS[agentDef.id];
      const isActive = state.agents[agentDef.id].active;
      // モニター（奥側）
      drawables.push({
        y: pos.gy - 0.2,
        z: 0,
        draw: () => drawMonitor(pos.gx, pos.gy, agentDef.id, isActive)
      });
      // デスク
      drawables.push({
        y: pos.gy,
        z: 0,
        draw: () => drawDesk(pos.gx, pos.gy, false)
      });
      // 椅子＋キャラ（手前側）
      drawables.push({
        y: pos.gy + 0.5,
        z: 0,
        draw: () => {
          drawChair(pos.gx, pos.gy, false);
          drawCharacter(agentDef, pos.gx, pos.gy, isActive, false);
        }
      });
    });

    // Boss workstation
    const bossAgent = {id:'boss', name:'社長', role:'最高責任者', color:'#c8973e', shirt:'#2d3748', emoji:'👑'};
    drawables.push({
      y: BOSS_POS.gy - 0.2,
      z: 0,
      draw: () => drawMonitor(BOSS_POS.gx, BOSS_POS.gy, 'boss', true)
    });
    drawables.push({
      y: BOSS_POS.gy,
      z: 0,
      draw: () => drawDesk(BOSS_POS.gx, BOSS_POS.gy, true)
    });
    drawables.push({
      y: BOSS_POS.gy + 0.5,
      z: 0,
      draw: () => {
        drawChair(BOSS_POS.gx, BOSS_POS.gy, true);
        drawCharacter(bossAgent, BOSS_POS.gx, BOSS_POS.gy, true, true);
      }
    });

    // Desk lamp glow for active agents
    AGENT_DEFS.forEach(agentDef => {
      const pos = AGENT_POS[agentDef.id];
      const ag = state.agents[agentDef.id];
      if (ag.active && ag.working) {
        const lampP = toIso(pos.gx + 0.4, pos.gy - 0.2, 0.7);
        drawables.push({
          y: pos.gy - 0.1,
          z: 1,
          draw: () => {
            c.fillStyle = agentDef.color + '15';
            c.beginPath();
            c.ellipse(lampP.sx, lampP.sy + 12, 18, 10, 0, 0, Math.PI * 2);
            c.fill();
            // Lamp
            const lp = toIso(pos.gx + 0.5, pos.gy - 0.15, 0.55);
            c.fillStyle = '#333';
            c.fillRect(lp.sx - 1, lp.sy - 8, 2, 8);
            c.fillStyle = agentDef.color;
            c.beginPath();
            c.ellipse(lp.sx, lp.sy - 9, 5, 3, 0, 0, Math.PI * 2);
            c.fill();
          }
        });
      }
    });

    // Sort by y (depth), then draw
    drawables.sort((a, b) => a.y - b.y || a.z - b.z);
    drawables.forEach(d => d.draw());

    // Draw effects on top
    drawParticles();
    drawFloatingEmojis();

  } catch (e) {
    console.error('Draw error:', e);
  }
}

function buildAgentCards() {
  const list = document.getElementById('agentList');
  list.innerHTML = '';
  AGENT_DEFS.forEach(agentDef => {
    const card = document.createElement('div');
    card.className = 'agent-card inactive';
    card.id = 'card-' + agentDef.id;
    card.style.setProperty('--agent-color', agentDef.color);
    card.innerHTML = `
      <div class="agent-avatar" style="background:${agentDef.color}18">${agentDef.emoji}</div>
      <div class="agent-info">
        <div class="name">${agentDef.name}</div>
        <div class="role">${agentDef.role}</div>
        <div class="action" id="action-${agentDef.id}"></div>
        <div class="thought" id="thought-${agentDef.id}"></div>
      </div>
      <div class="status-indicator idle" id="status-${agentDef.id}"></div>
    `;
    list.appendChild(card);
  });
}

function updateAgentCards() {
  AGENT_DEFS.forEach(agentDef => {
    const ag = state.agents[agentDef.id];
    const card = document.getElementById('card-' + agentDef.id);
    if (!card) return;
    card.className = 'agent-card ' + (ag.active ? 'active' : 'inactive');
    const statusEl = document.getElementById('status-' + agentDef.id);
    if (statusEl) {
      statusEl.className = 'status-indicator ' + (ag.working ? 'working' : (ag.active ? 'waiting' : 'idle'));
    }
    const actionEl = document.getElementById('action-' + agentDef.id);
    if (actionEl) actionEl.textContent = ag.action || '';
    const thoughtEl = document.getElementById('thought-' + agentDef.id);
    if (thoughtEl) {
      thoughtEl.textContent = ag.thought ? '💭 ' + ag.thought : '';
      thoughtEl.style.display = ag.thought ? 'block' : 'none';
    }
    // Color avatar border
    const avatar = card.querySelector('.agent-avatar');
    if (avatar) avatar.style.borderColor = ag.active ? agentDef.color : 'transparent';
  });
}

function addLog(agentId, message) {
  const panel = document.getElementById('logPanel');
  const now = new Date();
  const ts = [now.getHours(), now.getMinutes(), now.getSeconds()].map(v => String(v).padStart(2, '0')).join(':');
  const agent = AGENT_DEFS.find(a => a.id === agentId);
  const tagName = agentId === 'boss' ? '社長' : (agent ? agent.name : 'システム');
  const tagColor = agentId === 'boss' ? '#c8973e' : (agent ? agent.color : '#888');

  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="log-time">${ts}</span> <span class="log-tag" style="background:${tagColor}30;color:${tagColor}">${tagName}</span> ${escapeHTML(message)}`;
  panel.appendChild(line);

  // Limit lines
  while (panel.children.length > 100) panel.removeChild(panel.firstChild);
  panel.scrollTop = panel.scrollHeight;

  state.logs.push({ts, agent: agentId, msg: message});
}

function escapeHTML(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function addConfirm(fromAgent, msg) {
  const id = ++state.confirmIdCounter;
  state.confirmQueue.push({id, from: fromAgent, msg, resolved: false});
  updateConfirmSection();
}

function updateConfirmSection() {
  const section = document.getElementById('confirmSection');
  const list = document.getElementById('confirmList');
  const badge = document.getElementById('confirmBadge');
  const pending = state.confirmQueue.filter(c => !c.resolved);

  if (pending.length === 0) {
    section.classList.remove('visible');
    return;
  }
  section.classList.add('visible');
  badge.textContent = pending.length + '件';

  list.innerHTML = '';
  pending.forEach(conf => {
    const agent = AGENT_DEFS.find(a => a.id === conf.from);
    const card = document.createElement('div');
    card.className = 'confirm-card';
    card.innerHTML = `
      <div class="from">${agent ? agent.emoji + ' ' + agent.name : '📋 リード'}より</div>
      <div class="msg">${escapeHTML(conf.msg)}</div>
      <div class="confirm-btns">
        <button class="btn-approve" onclick="resolveConfirm(${conf.id},'approve')">✅ 承認</button>
        <button class="btn-reject" onclick="resolveConfirm(${conf.id},'reject')">❌ 却下</button>
        <button class="btn-reply" onclick="resolveConfirm(${conf.id},'reply')">💬 返信</button>
      </div>
    `;
    list.appendChild(card);
  });
}

function resolveConfirm(id, action) {
  const conf = state.confirmQueue.find(c => c.id === id);
  if (!conf) return;
  conf.resolved = true;
  const labels = {approve: '承認しました', reject: '却下しました', reply: '返信しました'};
  addLog('boss', '📩 ' + labels[action]);
  setTimeout(() => {
    state.confirmQueue = state.confirmQueue.filter(c => !c.resolved);
    updateConfirmSection();
  }, 3000);
  updateConfirmSection();
  // Resume simulation if paused for confirm
  if (state.mode === 'demo' && state.running && state._pausedForConfirm) {
    state._pausedForConfirm = false;
    advanceDemo();
  }
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    [now.getHours(), now.getMinutes(), now.getSeconds()].map(v => String(v).padStart(2, '0')).join(':');
}

function updateActiveAgents() {
  const activeIds = PHASE_ACTIVE[state.phase] || [];
  AGENT_DEFS.forEach(agentDef => {
    const ag = state.agents[agentDef.id];
    const wasActive = ag.active;
    ag.active = activeIds.includes(agentDef.id);
    if (ag.active && !wasActive) {
      ag._justActivated = true;
      ag._activatedTime = state.time;
    }
    if (!ag.active) {
      ag.working = false;
      ag.action = '';
      ag.thought = '';
    }
  });
}

function startDemo() {
  state.mode = 'demo';
  state.running = true;
  state.eventIndex = 0;
  state.phase = 0;
  state.stats = {files: 0, lines: 0, tests: 0, bugs: 0};
  state.confirmQueue = [];
  AGENT_DEFS.forEach(a => {
    const ag = state.agents[a.id];
    ag.active = false; ag.working = false; ag.action = ''; ag.thought = '';
  });
  document.getElementById('logPanel').innerHTML = '';
  addLog('boss', '🎬 デモモード開始: 新作ゲーム開発プロジェクト');
  updateUI();
  advanceDemo();
}

function advanceDemo() {
  if (!state.running || state.mode !== 'demo') return;
  if (state.eventIndex >= DEMO_EVENTS.length) {
    state.running = false;
    addLog('boss', '✨ デモ完了');
    updateUI();
    return;
  }

  const ev = DEMO_EVENTS[state.eventIndex];
  state.eventIndex++;

  // Process event
  processDevEvent(ev);

  // Handle extra stats
  if (ev.s2 && ev.n2) {
    state.stats[ev.s2] = (state.stats[ev.s2] || 0) + ev.n2;
  }

  // Celebration
  if (ev._celebrate) {
    spawnCelebration();
  }

  // If this event has a confirm, pause
  if (ev.confirm) {
    state._pausedForConfirm = true;
    // Auto-resume after timeout if user doesn't respond
    setTimeout(() => {
      if (state._pausedForConfirm) {
        state._pausedForConfirm = false;
        advanceDemo();
      }
    }, 8000 / state.speed);
    return;
  }

  // Schedule next event
  const delay = (ev.d || 3000) / state.speed;
  state.eventTimer = setTimeout(() => {
    // Clear previous agent working state after a bit
    if (ev.a) {
      const ag = state.agents[ev.a];
      if (ag) {
        ag.working = false;
        // Keep thought for a bit
        setTimeout(() => { if (ag) ag.thought = ''; }, 1500 / state.speed);
      }
    }
    advanceDemo();
  }, delay);
}

function stopDemo() {
  state.running = false;
  if (state.eventTimer) clearTimeout(state.eventTimer);
}

let simQueue = [];
let simTimer = null;

function simulateResponse(text) {
  addLog('boss', '📢 ' + text);

  // 自動デモが走っていたら停止
  stopDemo();
  state._pausedForConfirm = false;

  // 既存のシミュレーションをクリア
  if (simTimer) { clearTimeout(simTimer); simTimer = null; }
  simQueue = [];

  // 全エージェントをリセット＆アクティブに
  AGENT_DEFS.forEach(a => {
    const ag = state.agents[a.id];
    ag.active = true;
    ag.working = false;
    ag.action = '';
    ag.thought = '';
  });

  // 確認キューもクリア
  state.confirmQueue = [];

  // シナリオ生成
  simQueue = buildScenario(text);

  updateUI();

  // 少し間を置いてから連鎖実行開始（リセットが画面に反映されてから）
  setTimeout(() => executeSimStep(), 300);
}

function executeSimStep() {
  if (simQueue.length === 0) { simTimer = null; return; }

  const step = simQueue.shift();
  const ag = state.agents[step.a];
  if (!ag) { executeSimStep(); return; }

  // エージェント起動
  ag.working = true;
  ag.action = step.t;
  ag.thought = step.th || '';
  spawnParticles(step.a);
  spawnFloatingEmoji(step.a, step.e || '💬');

  // ログ
  const agentDef = AGENT_DEFS.find(a => a.id === step.a);
  addLog(step.a, step.e + ' ' + step.t);

  // stats更新
  if (step.s && step.n) {
    state.stats[step.s] = (state.stats[step.s] || 0) + step.n;
  }

  updateUI();

  // 次のステップへ
  const delay = step.d || 3000;
  simTimer = setTimeout(() => {
    ag.working = false;
    setTimeout(() => { ag.thought = ''; }, 1000);
    updateUI();
    executeSimStep();
  }, delay);
}

// SECTION: MAIN LOOP
// ============================================================
function mainLoop(timestamp) {
  const now = timestamp || performance.now();
  const rawDt = lastFrame > 0 ? (now - lastFrame) : 16.667;
  const dt = Math.min(rawDt, 50) / 16.667;
  lastFrame = now;
  state.time = now;

  // Update animations
  AGENT_DEFS.forEach(a => {
    state.agents[a.id].animPhase += 0.016 * dt;
  });

  updateParticles(dt);
  updateFloatingEmojis(dt);

  // Draw
  draw();

  // Clock
  if (Math.floor(now / 1000) !== Math.floor((now - rawDt) / 1000)) {
    updateClock();
  }

  requestAnimationFrame(mainLoop);
}

// ============================================================
function connectWebSocket(projectDir) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    disconnectWebSocket();
  }

  const wsUrl = 'ws://localhost:3456';
  updateLiveStatus('connecting', '接続中...');

  try {
    ws = new WebSocket(wsUrl);
  } catch (e) {
    updateLiveStatus('error', '接続失敗: ' + e.message);
    return;
  }

  ws.onopen = () => {
    // プロジェクトディレクトリを送信
    ws.send(JSON.stringify({ type: 'connect', projectDir }));
  };

  ws.onmessage = (event) => {
    let msg;
    try {
      msg = JSON.parse(event.data);
    } catch { return; }
    handleServerMessage(msg);
  };

  ws.onclose = (event) => {
    liveConnected = false;
    updateLiveStatus('disconnected', '切断 (code: ' + event.code + ')');
    addLog('boss', '\u{1F4E1} サーバーとの接続が切断されました');
    ws = null;
  };

  ws.onerror = () => {
    updateLiveStatus('error', '接続エラー \u2014 サーバーが起動しているか確認してください');
  };
}

function disconnectWebSocket() {
  if (ws) {
    // 実行中のコマンドを中断
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'abort' }));
    }
    ws.close();
    ws = null;
  }
  liveConnected = false;
  updateLiveStatus('disconnected', '未接続');
  // 全エージェントをアイドルに
  AGENT_DEFS.forEach(a => {
    state.agents[a.id].working = false;
    state.agents[a.id].action = '';
    state.agents[a.id].thought = '';
  });
  updateUI();
}

function handleServerMessage(msg) {
  switch (msg.type) {
    case 'connected':
      liveConnected = true;
      updateLiveStatus('connected', '\u2705 接続完了: ' + msg.projectDir);
      addLog('boss', '\u{1F4E1} プロジェクトに接続: ' + msg.projectDir);
      // 全エージェントをスタンバイ状態に
      AGENT_DEFS.forEach(a => { state.agents[a.id].active = true; });
      updateUI();
      break;

    case 'dev_event':
      if (msg.event) {
        processDevEvent(msg.event);
      }
      break;

    case 'command_done':
      // コマンド完了: エージェントのworkingを解除
      setTimeout(() => {
        AGENT_DEFS.forEach(a => {
          const ag = state.agents[a.id];
          ag.working = false;
          ag.thought = '';
        });
        updateUI();
      }, 1500);
      break;

    case 'error':
      addLog('boss', '\u274C エラー: ' + (msg.message || '不明なエラー'));
      updateLiveStatus('error', msg.message || 'エラー');
      break;
  }
}

function updateLiveStatus(status, text) {
  const dot = document.getElementById('liveDot');
  const label = document.getElementById('liveStatus');
  if (label) label.textContent = text;
  if (dot) {
    dot.className = 'dot';
    if (status === 'connected') dot.classList.add('connected');
  }
}

  btnAttach.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => {
    Array.from(fileInput.files).forEach(f => addPendingFile(f));
    fileInput.value = '';
  });

  // ドラッグ＆ドロップ対応（コマンドバー周辺）
  const commandBar = document.getElementById('commandBar');
  commandBar.addEventListener('dragover', (e) => { e.preventDefault(); commandBar.style.borderColor = 'var(--accent)'; });
  commandBar.addEventListener('dragleave', () => { commandBar.style.borderColor = ''; });
  commandBar.addEventListener('drop', (e) => {
    e.preventDefault();
    commandBar.style.borderColor = '';
    Array.from(e.dataTransfer.files).forEach(f => addPendingFile(f));
  });

  // Controls
  document.getElementById('btnDemo').addEventListener('click', () => {
    document.getElementById('btnDemo').classList.add('active');
    hideLivePanel();
    stopDemo();
    startDemo();
  });

  // Liveモードボタン
  document.getElementById('btnLive').addEventListener('click', () => {
    // 既にLive接続中ならOFF
    if (CONNECTION_MODE === 'websocket') {
      disconnectWebSocket();
      CONNECTION_MODE = 'simulation';
      state.mode = 'demo';
      document.getElementById('btnLive').classList.remove('active');
      document.getElementById('btnDemo').classList.add('active');
      document.getElementById('livePanel').classList.remove('visible');
      addLog('boss', '\u{1F4E1} Liveモードを終了しました');
      AGENT_DEFS.forEach(a => { state.agents[a.id].active = true; });
      updateUI();
      return;
    }
    // パスを聞いて即接続
    const dir = prompt('プロジェクトのフォルダパスを入力してください\n（cdは不要。パスのみ入力）\n例: /Users/shigemotoyasunari/Code-Lab');
    if (!dir || !dir.trim()) return;
    document.getElementById('btnLive').classList.add('active');
    document.getElementById('btnDemo').classList.remove('active');
    stopDemo();
    CONNECTION_MODE = 'websocket';
    state.mode = 'live';
    state.running = false;
    document.getElementById('livePanel').classList.add('visible');
    addLog('boss', '\u{1F4E1} Live接続中...');
    AGENT_DEFS.forEach(a => { state.agents[a.id].active = false; state.agents[a.id].working = false; });
    updateUI();
    connectWebSocket(dir.trim());
  });

  // デモ/手動ボタンでLive切断
  const hideLivePanel = () => {
    document.getElementById('livePanel').classList.remove('visible');
    document.getElementById('btnLive').classList.remove('active');
    if (CONNECTION_MODE === 'websocket') {
      disconnectWebSocket();
      CONNECTION_MODE = 'simulation';
    }
  };

  // Start with initial log
  addLog('boss', '🧪 Code-Lab 司令室を起動しました');
  addLog('boss', '💡 「▶ デモ」で自動デモ、「🎯 手動」で手動モードに切り替えられます');

  // Auto start demo
  setTimeout(() => startDemo(), 1500);

  // Start render loop
  requestAnimationFrame(mainLoop);
}

// Make resolveConfirm globally accessible
window.resolveConfirm = resolveConfirm;

// Start
init();
</script>
</body>
</html>
